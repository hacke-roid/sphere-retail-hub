services:
  mongo:
    image: mongo:7
    container_name: fastapi-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: fastapi
      MONGO_INITDB_ROOT_PASSWORD: fastapi_password
      MONGO_INITDB_DATABASE: fastapi
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "fastapi",
          "-p",
          "fastapi_password",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 5s
      timeout: 5s
      start_period: 20s
      retries: 10

volumes:
  mongo_data:
